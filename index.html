<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felicitare 8 Martie</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9ecb,#ffd6e7,#ffeef6);
font-family:Arial;
overflow:hidden;
}

.card{
width:340px;
height:230px;
position:relative;
transform-style:preserve-3d;
transition:1s;
cursor:pointer;
}

.card.open{
transform:rotateY(180deg);
}

.side{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.front{
background:white;
font-size:26px;
color:#c21875;
}

.back{
background:#fff0f6;
transform:rotateY(180deg);
font-size:20px;
color:#7a004b;
flex-direction:column;
}

button{
margin-top:15px;
padding:10px 18px;
border:none;
border-radius:10px;
background:#ff4fa3;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

.fall{
position:fixed;
top:-20px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px)}
100%{transform:translateY(110vh)}
}

.firework{
position:fixed;
</html>
