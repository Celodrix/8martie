<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felicitare 8 Martie</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9ecb,#ffd6e7,#ffeef6);
font-family:Arial;
overflow:hidden;
}

.card{
width:340px;
height:230px;
position:relative;
transform-style:preserve-3d;
transition:1s;
cursor:pointer;
}

.card.open{
transform:rotateY(180deg);
}

.side{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.front{
background:white;
font-size:26px;
color:#c21875;
}

.back{
background:#fff0f6;
transform:rotateY(180deg);
font-size:20px;
color:#7a004b;
flex-direction:column;
}

.fall{
position:fixed;
top:-20px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px)}
100%{transform:translateY(110vh)}
}

.firework{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);opacity:1}
100%{transform:scale(18);opacity:0}
}

</style>
</head>

<body>

<div class="card" onclick="openCard()" id="card">

<div class="side front">
🌸 Apasă să deschizi felicitarea 🌸
</div>

<div class="side back">
💐 La mulți ani de 8 Martie!<br><br>
Pentru tine ❤️<br>
Să ai o primăvară plină de bucurii!
</div>

</div>

<!-- Muzică pe fundal -->
<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

function openCard(){
const card=document.getElementById("card");
card.classList.toggle("open");
launchFireworks();
}

const simboluri=["🌸","🌷","🌹","💖","💐","❤️"];

function creeaza(){
const el=document.createElement("div");

el.className="fall";
el.innerHTML=simboluri[Math.floor(Math.random()*simboluri.length)];

el.style.left=Math.random()*100+"vw";
el.style.animationDuration=(3+Math.random()*5)+"s";
el.style.fontSize=(20+Math.random()*30)+"px";


document.body.appendChild(el);

setTimeout(()=>{el.remove()},8000);
}

setInterval(creeaza,300);

function launchFireworks(){
for(let i=0;i<25;i++){
createFirework();
}
}

function createFirework(){
const f=document.createElement("div");
f.className="firework";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*80+"vh";

f.style.background=`hsl(${Math.random()*360},100%,60%)`;

document.body.appendChild(f);

setTimeout(()=>{f.remove()},1000);
}

// artificii ocazionale pe fundal
setInterval(()=>{
createFirework();
},1500);

</script>

</body>
</html>
